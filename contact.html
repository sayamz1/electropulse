<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact ElectroPulse for questions and support.">
    <title>ElectroPulse | Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1 class="logo">ElectroPulse</h1>

        <button id="menuToggle" class="menu-toggle">☰</button>

        <nav id="navMenu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Products</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <section class="contact">

            <h2>Contact Us</h2>

            <p>
                If you have any questions, please send us a message using the form below.
            </p>

            <form id="contactForm">

                <div class="form-group">
                    <label for="name">Name</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your name"
                        required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Enter your email"
                        required>
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea
                        id="message"
                        rows="5"
                        placeholder="Write your message here..."
                        required></textarea>
                </div>

                <button type="submit" class="btn">
                    Send Message
                </button>

                <p id="formFeedback"></p>

            </form>

        </section>

    </main>

    <footer>
        <p>&copy; 2026 ElectroPulse. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>

</body>
</html>
