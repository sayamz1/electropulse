<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Have questions about your order or our gadgets? Get in touch with ElectroPulse customer support.">
    <title>ElectroPulse | Contact Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">ElectroPulse</div>
        <button class="menu-toggle" id="menuToggle" aria-label="Toggle Navigation">☰</button>
        <nav id="navMenu">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">Products</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h2>Customer Support</h2>
            <p style="margin-bottom: 1.5rem; color: #666; font-size: 0.9rem;">Need order help or technical troubleshooting? Drop us a line.</p>
            <form id="contactForm">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Your Message:</label>
                    <textarea id="message" rows="5" placeholder="How can we help you today?" required></textarea>
                </div>
                <button type="submit" class="btn">Submit Inquiry</button>
                <p id="formFeedback" class="feedback"></p>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 ElectroPulse Tech Store. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
